<!doctype html>
<html lang="en">
  <head>
    <title>CT Logs</title>
    <style>
      table {
        width: 100%;
      }
      #logTable {
        max-width: 60rem;
        margin: 0 auto;
      }
      table,
      thead,
      tr,
      td {
        margin: 0;
        border-spacing: 0;
        padding: 0.25em;
      }
      th,
      td {
        width: 10rem;
        overflow: hidden;
      }
      tr.log_id > td.value,
      tr.log_id_hex > td.value,
      tr.key > td.value {
        font-family: monospace;
        word-break: break-all;
      }
      thead,
      td.key {
        font-weight: bold;
        text-align: left;
      }
      label {
        background: lightsteelblue;
        padding: 0.3rem 1rem;
        border-radius: 0.5rem;
        margin: 1rem 0;
        cursor: pointer;
        user-select: none;
      }
      input#hideNotCurrent {
        display: none;
      }
      tbody#logs td:has(> button.row-trigger) {
        padding: 0;
      }
      tbody#logs td button.row-trigger {
        all: unset;
        display: flex;
        align-items: center;
        box-sizing: border-box;
        width: 100%;
        min-height: 2.5rem;
        padding: 0.25em;
        cursor: pointer;
        color: inherit;
      }
      [popover].log-popover {
        padding: 1rem;
        border: 1px solid #888;
        border-radius: 0.5rem;
        width: max-content;
        max-width: 90vw;
        max-height: 85vh;
        overflow: auto;
      }
      [popover].log-popover table {
        width: auto;
      }
      [popover].log-popover td {
        width: auto;
        white-space: nowrap;
      }
      [popover].log-popover tr.log_id > td.value,
      [popover].log-popover tr.log_id_hex > td.value,
      [popover].log-popover tr.key > td.value {
        white-space: normal;
      }
      [popover].log-popover::backdrop {
        background-color: rgba(200, 200, 200, 0.4);
        backdrop-filter: blur(3px);
      }
      /* Prevent click-through to other rows while a popover is open. */
      body:has([popover].log-popover:popover-open)
        tbody#logs
        button.row-trigger {
        pointer-events: none;
      }
      [popover].log-popover table {
        width: 100%;
      }
      input#hideNotCurrent:not(:checked)
        ~ table
        tbody#logs
        > tr:not(.current):not(.operator-header) {
        display: none;
      }
      input#hideNotCurrent:not(:checked)
        ~ table
        tbody#logs
        > tr.operator-header.no-current-logs {
        display: none;
      }

      tbody#logs > tr:not(.current):not(.operator-header) {
        color: #888;
      }
      body:not(:has([popover].log-popover:popover-open))
        tbody#logs
        > tr:not(.operator-header):hover {
        background-color: #eef3fb;
      }

      input#hideNotCurrent ~ label::before {
        content: "hide ";
      }
      input#hideNotCurrent:not(:checked) ~ label::before {
        content: "show ";
      }

      .conflict-value {
        font-weight: bold;
        color: #d63384;
      }

      .operator-header {
        background-color: #f8f9fa;
      }

      .operator-header td {
        font-weight: bold;
        font-size: 1.1em;
        background-color: #e9ecef;
        padding: 0.75rem;
        border-top: 2px solid #6c757d;
        border-bottom: 1px solid #dee2e6;
      }
    </style>
  </head>
  <body>
    <h1>CT Logs</h1>

    <input type="checkbox" id="hideNotCurrent" />
    <!-- CSS adds a "show" or "hide" ::before this label -->
    <label for="hideNotCurrent">not-current logs</label>

    <div id="loading">Loading CT log data...</div>
    <div id="error" style="display: none; color: red"></div>

    <table id="logTable" style="display: none">
      <thead>
        <tr>
          <th>Name</th>
          <th>Apple</th>
          <th>Google</th>
        </tr>
      </thead>
      <tbody id="logs"></tbody>
    </table>
    <div id="popovers"></div>

    <script>
      // Utility functions from render.py
      function logName(operator, description) {
        let orig = description;

        // Remove suffixes
        const suffixes = ["CT Log", "CT log", "Log", "log", " ", "'"];
        for (const suffix of suffixes) {
          if (description.endsWith(suffix)) {
            description = description.slice(0, -suffix.length);
          }
        }

        // Remove prefixes
        const prefixes = [
          operator,
          "Nordu",
          "Up In The Air",
          "Symantec",
          " ",
          "'",
        ];
        for (const prefix of prefixes) {
          if (description.startsWith(prefix)) {
            description = description.slice(prefix.length);
          }
        }

        return description.length === 0 ? orig : description;
      }

      function normalizeOperatorName(operatorName) {
        // Map operator name variations to a canonical form
        const operatorMappings = {
          "IPng GmbH": "IPng Networks",
        };

        return operatorMappings[operatorName] || operatorName;
      }

      function flattenLogs(logs) {
        const result = [];
        for (const operator of logs.operators) {
          const opName = normalizeOperatorName(operator.name);
          const allLogs = [
            ...(operator.logs || []),
            ...(operator.tiled_logs || []),
          ];

          for (const log of allLogs) {
            const flatLog = { ...log };
            flatLog.operator = opName;
            flatLog.name = logName(opName, log.description);

            // Handle state
            if (log.state) {
              const stateKeys = Object.keys(log.state);
              if (stateKeys.length > 0) {
                flatLog.state = stateKeys[0];
                flatLog.state_timestamp = log.state[stateKeys[0]].timestamp;
              }
            } else if (log.log_type) {
              // Use log_type as state when state is missing
              flatLog.state = log.log_type;
            }

            // Handle temporal_interval
            if (log.temporal_interval) {
              flatLog.start = log.temporal_interval.start_inclusive;
              flatLog.end = log.temporal_interval.end_exclusive;
            }

            // log_id is base64 in the source data; some systems display it
            // as hex, so precompute that representation here.
            if (log.log_id) {
              flatLog.log_id_hex = base64ToHex(log.log_id);
            }

            result.push(flatLog);
          }
        }
        return result;
      }

      function base64ToHex(b64) {
        const bin = atob(b64);
        let hex = "";
        for (let i = 0; i < bin.length; i++) {
          hex += bin.charCodeAt(i).toString(16).padStart(2, "0");
        }
        return hex;
      }

      function allKeys(a, b) {
        const keysA = a ? Object.keys(a) : [];
        const keysB = b ? Object.keys(b) : [];
        return new Set([...keysA, ...keysB]);
      }

      function isCurrentState(state) {
        return (
          state === "pending" || state === "usable" || state === "qualified"
        );
      }

      function condGet(m, k) {
        return m ? m[k] : null;
      }

      function mergeItem(d, k, appleValue, googleValue) {
        // Special handling for state - always preserve both sides in their own columns
        if (k === "state") {
          d["apple_" + k] = appleValue;
          d["google_" + k] = googleValue;
          return;
        }

        // Default handling for non-state fields
        if (appleValue === null || appleValue === undefined) {
          d[k] = googleValue;
          return;
        }
        if (googleValue === null || googleValue === undefined) {
          d[k] = appleValue;
          return;
        }
        if (appleValue === googleValue) {
          d[k] = appleValue;
          return;
        }
        if (k === "name") {
          // Only really want one of the names, so pick one
          d[k] = googleValue;
          return;
        }
        d["apple_" + k] = appleValue;
        d["google_" + k] = googleValue;
      }

      function mergeLog(apple, google) {
        const merge = {
          apple: apple !== null && apple !== undefined,
          google: google !== null && google !== undefined,
        };

        for (const key of allKeys(apple, google)) {
          mergeItem(merge, key, condGet(apple, key), condGet(google, key));
        }

        return merge;
      }

      function mergeLogLists(appleLogs, googleLogs) {
        const appleMap = {};
        const googleMap = {};

        // Create maps using URL as key
        for (const log of appleLogs) {
          const key = log.url || log.submission_url;
          if (key) appleMap[key] = log;
        }

        for (const log of googleLogs) {
          const key = log.url || log.submission_url;
          if (key) googleMap[key] = log;
        }

        const result = [];
        const allUrls = new Set([
          ...Object.keys(appleMap),
          ...Object.keys(googleMap),
        ]);

        for (const url of allUrls) {
          const merged = mergeLog(
            appleMap[url] || null,
            googleMap[url] || null,
          );
          result.push(merged);
        }

        return result;
      }

      function renderLogTable(logs) {
        // Sort logs by operator and name
        logs.sort((a, b) => {
          const opCompare = (a.operator || "").localeCompare(b.operator || "");
          if (opCompare !== 0) return opCompare;
          return (a.name || "").localeCompare(b.name || "");
        });

        // First pass: determine which operators have current logs
        const operatorsWithCurrentLogs = new Set();
        logs.forEach((log) => {
          if (isCurrentState(log.apple_state) || isCurrentState(log.google_state)) {
            operatorsWithCurrentLogs.add(log.operator);
          }
        });

        const tbody = document.getElementById("logs");
        tbody.replaceChildren();
        const popoversContainer = document.getElementById("popovers");
        popoversContainer.replaceChildren();

        let currentOperator = "";
        let logIndex = 0;

        logs.forEach((log) => {
          // Add operator section header if this is a new operator
          if (log.operator !== currentOperator) {
            currentOperator = log.operator;

            const operatorRow = document.createElement("tr");
            operatorRow.classList.add("operator-header");

            // Add class if operator has no current logs
            if (!operatorsWithCurrentLogs.has(log.operator)) {
              operatorRow.classList.add("no-current-logs");
            }

            const operatorCell = document.createElement("td");
            operatorCell.colSpan = 3;
            operatorCell.textContent = log.operator || "Unknown Operator";
            operatorRow.appendChild(operatorCell);
            tbody.appendChild(operatorRow);
          }

          logIndex++;
          const popoverId = `log${logIndex}`;
          const tr = document.createElement("tr");

          // Add current class if log is current in either program
          if (isCurrentState(log.apple_state) || isCurrentState(log.google_state)) {
            tr.classList.add("current");
          }

          const appleState = log.apple_state || "";
          const googleState = log.google_state || "";
          const stateConflict =
            appleState && googleState && appleState !== googleState;

          tr.appendChild(makeTriggerCell("name", log.name || "", popoverId));
          tr.appendChild(
            makeTriggerCell(
              "state apple-state" + (stateConflict ? " conflict-value" : ""),
              appleState,
              popoverId,
            ),
          );
          tr.appendChild(
            makeTriggerCell(
              "state google-state" + (stateConflict ? " conflict-value" : ""),
              googleState,
              popoverId,
            ),
          );

          tbody.appendChild(tr);

          const popover = document.createElement("div");
          popover.id = popoverId;
          popover.className = "log-popover";
          popover.setAttribute("popover", "");
          const detailsTable = document.createElement("table");
          appendLogDetailRows(detailsTable, log);
          popover.appendChild(detailsTable);
          popoversContainer.appendChild(popover);
        });
      }

      function makeTriggerCell(tdClass, text, popoverId) {
        const td = document.createElement("td");
        td.className = tdClass;
        const button = document.createElement("button");
        button.type = "button";
        button.className = "row-trigger";
        button.setAttribute("popovertarget", popoverId);
        button.textContent = text;
        td.appendChild(button);
        return td;
      }

      function appendLogDetailRows(table, log) {
        const keys = [
          "description",
          "state",
          "log_type",
          "url",
          "submission_url",
          "monitoring_url",
          "start",
          "end",
          "log_id",
          "log_id_hex",
          "key",
          "mmd",
          "state_timestamp",
          "apple",
          "google",
        ];

        for (const baseKey of keys) {
          const variants = [baseKey, "apple_" + baseKey, "google_" + baseKey];

          for (const key of variants) {
            if (!log.hasOwnProperty(key)) continue;

            let valueClass = "value";

            // Add conflict highlighting for apple_/google_ prefixed fields
            if (key.startsWith("apple_") || key.startsWith("google_")) {
              if (
                !key.endsWith("_state_timestamp") &&
                !key.endsWith("_description")
              ) {
                // For state, only highlight when the two sides actually differ
                if (key.endsWith("_state")) {
                  if (log.apple_state !== log.google_state) {
                    valueClass += " conflict-value";
                  }
                } else {
                  valueClass += " conflict-value";
                }
              }
            }

            const tr = document.createElement("tr");
            tr.className = key;

            const keyCell = document.createElement("td");
            keyCell.className = "key";
            keyCell.textContent = key;
            tr.appendChild(keyCell);

            const valueCell = document.createElement("td");
            valueCell.className = valueClass;
            valueCell.colSpan = 3;
            valueCell.textContent = String(log[key]);
            tr.appendChild(valueCell);

            table.appendChild(tr);
          }
        }
      }

      async function loadData() {
        try {
          const [appleResponse, googleResponse] = await Promise.all([
            fetch("data/apple/current_log_list.json"),
            fetch("data/google/all_log_list.json"),
          ]);

          if (!appleResponse.ok || !googleResponse.ok) {
            throw new Error("Failed to load JSON data");
          }

          const appleData = await appleResponse.json();
          const googleData = await googleResponse.json();

          const appleLogs = flattenLogs(appleData);
          const googleLogs = flattenLogs(googleData);
          const mergedLogs = mergeLogLists(appleLogs, googleLogs);

          document.getElementById("loading").style.display = "none";
          document.getElementById("logTable").style.display = "table";

          renderLogTable(mergedLogs);
        } catch (error) {
          document.getElementById("loading").style.display = "none";
          document.getElementById("error").style.display = "block";
          document.getElementById("error").textContent =
            "Error loading data: " + error.message;
        }
      }

      // Load data when page loads
      document.addEventListener("DOMContentLoaded", loadData);
    </script>
  </body>
</html>
